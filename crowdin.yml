project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."

preserve_hierarchy: true

files:
  - source: "/crates/openlogi-gui/locales/en.yml"
    translation: "/crates/openlogi-gui/locales/%locale%.yml"
    type: "yaml"
    languages_mapping:
      locale:
        ja: "ja"
        ru: "ru"
        zh-CN: "zh-CN"
        zh-HK: "zh-HK"
        zh-TW: "zh-TW"
        it: "it"
